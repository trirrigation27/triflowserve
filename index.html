  const parseQuoteFromAI=(text,userMsg)=>{
    // Detect if response contains a quote (has dollar amounts and Total)
    if(!text.includes("Total:")&&!text.includes("TOTAL:"))return null;
    // Try to extract client name from user message or AI response
    let clientName="";
    CLIENTS.forEach(c=>{if(userMsg.toLowerCase().includes(c.name.toLowerCase())||text.toLowerCase().includes(c.name.toLowerCase()))clientName=c.name;});
    const client=CLIENTS.find(c=>c.name===clientName);
    // Extract line items — look for lines with $ amounts
    const lines=[];
    text.split("\n").forEach(line=>{
      const match=line.match(/([A-Za-z\s"\/0-9]+?)[\s·:]+\$?([\d,]+\.?\d*)/);
      if(match&&!line.toLowerCase().includes("subtotal")&&!line.toLowerCase().includes("total")&&!line.toLowerCase().includes("tax")){
        const name=match[1].trim().replace(/^[-•*]\s*/,"");
        const rate=parseFloat(match[2].replace(",",""));
        if(rate>0&&rate<5000&&name.length>3){
          // Try to match to a service
          const svc=SERVICES.find(s=>s.name.toLowerCase().includes(name.toLowerCase().slice(0,8))||name.toLowerCase().includes(s.name.toLowerCase().slice(0,8)));
          lines.push({id:Date.now()+Math.random(),name:svc?svc.name:name,qty:1,rate:svc?svc.rate:rate});
        }
      }
    });
    if(lines.length===0)return null;
    // Remove duplicates
    const unique=lines.filter((l,i)=>lines.findIndex(x=>x.name===l.name)===i);
    return{client:clientName,clientObj:client,lines:unique,rawText:text,quoteNum:`QTE${String(Date.now()).slice(-5)}`};

    card:{background:"#0c1a2e",border:"1px solid #1e3a5f",borderRadius:10,padding:"12px 14px"},
    cardLbl:{fontSize:9,fontFamily:"'JetBrains Mono',monospace",color:"#1e3a5f",letterSpacing:"0.1em",marginBottom:10},
    sel:{width:"100%",background:"#060f1a",border:"1px solid #1e3a5f",borderRadius:7,color:"#e2e8f0",padding:"8px 10px",fontSize:12,fontFamily:"'Barlow',sans-serif"},
    scroll:{flex:1,overflowY:"auto"},
    fLabel:{display:"block",fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:"#334155",letterSpacing:"0.08em",marginBottom:5},
    addBtn:{padding:"5px 14px",background:"#3b82f6",border:"none",borderRadius:6,color:"#fff",fontSize:12,cursor:"pointer",fontWeight:700,fontFamily:"'Barlow',sans-serif"},
    modalOverlay:{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100},
    modal:{background:"#0c1a2e",border:"1px solid #1e3a5f",borderRadius:14,padding:22,width:"min(460px,94vw)",maxHeight:"90vh",overflowY:"auto",animation:"slideIn 0.2s ease"},
  };

  return(
    <div style={S.root}>
      {/* HEADER */}
      <div style={S.hdr}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
            <rect width="30" height="30" rx="7" fill="#0c2040"/>
            <circle cx="15" cy="15" r="10" stroke="#3b82f6" strokeWidth="1.5" fill="none"/>
            <path d="M15 7c0 0-5 5.5-5 9a5 5 0 0010 0C20 12.5 15 7 15 7z" fill="#3b82f6" opacity=".85"/>
            <line x1="15" y1="10.5" x2="15" y2="19.5" stroke="#060f1a" strokeWidth="1.3" strokeLinecap="round"/>
            <line x1="12" y1="15" x2="18" y2="15" stroke="#060f1a" strokeWidth="1.3" strokeLinecap="round"/>
          </svg>
          <div>
            <div style={S.bName}>T&R Irrigation LLC</div>
            <div style={S.bSub}>Rocky Point NY · Robert & Thomas Pellicci · (631) 494-2813</div>
          </div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          {lowStock.length>0&&<div style={S.pill("#3d1a00","#92400e","#f97316")}>⚠ {lowStock.length} low stock</div>}
          {clientsWithBal.map(c=><div key={c.name} style={S.pill("#3d1a00","#92400e","#fbbf24")}>⚠ {c.name.split(" ")[0]}: ${c.balance}</div>)}
          <div style={S.pill("#052e16","#166534","#4ade80")}>● Live</div>
        </div>
      </div>

      <div style={S.body}>
        {/* SIDEBAR */}
        <div style={S.sidebar}>
          {MODULES.map(m=>(
            <button key={m.id} onClick={()=>setActive(m.id)} style={S.navBtn(active===m.id,m.color)}>
              <span style={{fontSize:15}}>{m.icon}</span>
              <div>
                <div style={{fontSize:12,fontWeight:600,color:active===m.id?"#e2e8f0":"#64748b",marginBottom:1}}>{m.label}</div>
                <div style={{fontSize:9,color:"#334155",lineHeight:1.3}}>{m.desc}</div>
              </div>
            </button>
          ))}
          <div style={{height:1,background:"#0c2040",margin:"8px 4px"}}/>
          <div style={{padding:"0 6px"}}>
            <div style={{fontSize:9,fontFamily:"'JetBrains Mono',monospace",color:"#1e3a5f",letterSpacing:"0.1em",marginBottom:8}}>TECHNICIANS</div>
            {Object.entries(TECHS).map(([key,t])=>(
              <div key={key} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 2px",marginBottom:4}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:t.color,flexShrink:0}}/>
                <div>
                  <div style={{fontSize:11,color:"#94a3b8",fontWeight:600}}>{t.name.split(" ")[0]}</div>
                  <div style={{fontSize:9,color:"#334155"}}>{avail[key].start}–{avail[key].end}</div>
                </div>
              </div>
            ))}
            <button onClick={()=>setShowAvailModal(true)} style={{padding:"5px 10px",background:"#0c2040",border:"1px solid #1e3a5f",borderRadius:6,color:"#475569",fontSize:10,cursor:"pointer",width:"100%",marginTop:4,fontFamily:"'JetBrains Mono',monospace"}}>Edit Hours</button>
          </div>
        </div>

        {/* MAIN */}
        <div style={S.main}>
          <div style={S.modBar}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:18}}>{mod.icon}</span>
              <div>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:17,color:mod.color,letterSpacing:"0.03em"}}>{mod.label}</div>
                <div style={{fontSize:10,color:"#334155",marginTop:1}}>{mod.desc}</div>
              </div>
            </div>
            {active==="calendar"&&<button onClick={()=>setShowJobModal(true)} style={S.addBtn}>+ Book Job</button>}
          </div>

          {/* CALENDAR */}
          {active==="calendar"&&(
            <div style={S.scroll}>
              {/* Cal controls */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 18px",borderBottom:"1px solid #0c2040",gap:8,flexWrap:"wrap"}}>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>{const d=new Date(calDate);d.setDate(d.getDate()-(calView==="week"?7:1));setCalDate(d);}} style={{padding:"5px 12px",background:"#0c2040",border:"1px solid #1e3a5f",borderRadius:6,color:"#60a5fa",fontSize:13,cursor:"pointer"}}>‹</button>
                  <button onClick={()=>setCalDate(new Date())} style={{padding:"5px 12px",background:"#0c2040",border:"1px solid #1e3a5f",borderRadius:6,color:"#60a5fa",fontSize:12,cursor:"pointer"}}>Today</button>
                  <button onClick={()=>{const d=new Date(calDate);d.setDate(d.getDate()+(calView==="week"?7:1));setCalDate(d);}} style={{padding:"5px 12px",background:"#0c2040",border:"1px solid #1e3a5f",borderRadius:6,color:"#60a5fa",fontSize:13,cursor:"pointer"}}>›</button>
                </div>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,color:"#e2e8f0"}}>
                  {calView==="today"?calDate.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"}):calDate.toLocaleDateString("en-US",{month:"long",year:"numeric"})}
                </div>
                <div style={{display:"flex",gap:6}}>
                  {["today","week","employee"].map(v=>(
                    <button key={v} onClick={()=>setCalView(v)} style={{padding:"5px 10px",background:calView===v?"#1e3a5f":"#0c1a2e",border:"1px solid #1e3a5f",borderRadius:6,color:calView===v?"#60a5fa":"#475569",fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>
                      {v==="employee"?"By Tech":v==="today"?"Day":"Week"}
                    </button>
                  ))}
                </div>
              </div>

              {/* STATUS LEGEND */}
              <div style={{display:"flex",gap:12,padding:"8px 18px",borderBottom:"1px solid #0c2040",background:"#07111f"}}>
                {[["🔵","Scheduled","#1e3a5f"],["🟡","En Route","#92400e"],["🟢","Complete","#166534"],["🔴","Needs Follow-up","#7f1d1d"]].map(([dot,label,bg])=>(
                  <div key={label} style={{display:"flex",alignItems:"center",gap:4}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:bg,border:`1px solid ${bg}`}}/>
                    <span style={{fontSize:10,color:"#475569",fontFamily:"'JetBrains Mono',monospace"}}>{label}</span>
                  </div>
                ))}
              </div>

              {/* TODAY VIEW */}
              {calView==="today"&&(()=>{
                const ds=fmtD(calDate);
                const dayJobs=jobsForDate(ds).sort((a,b)=>a.time.localeCompare(b.time));
                const robertJobs=dayJobs.filter(j=>j.tech==="robert");
                const thomasJobs=dayJobs.filter(j=>j.tech==="thomas");
                const statusColor=s=>s==="complete"?"#166534":s==="enroute"?"#92400e":s==="followup"?"#7f1d1d":"#1e3a5f";
                const statusBg=s=>s==="complete"?"#0d1f0d":s==="enroute"?"#1c0f00":s==="followup"?"#200000":"#0c1a2e";
                const statusLabel=s=>s==="complete"?"✓ Complete":s==="enroute"?"→ En Route":s==="followup"?"! Follow-up":"● Scheduled";
                const cycleStatus=job=>{
                  const order=["scheduled","enroute","complete","followup"];
                  const next=order[(order.indexOf(job.status||"scheduled")+1)%order.length];
                  setJobs(p=>p.map(j=>j.id===job.id?{...j,status:next}:j));
                };
                const makeGCalLink=job=>{
                  const client=CLIENTS.find(c=>c.name===job.client);
                  const svc=SERVICES.find(s=>s.id===job.service);
                  const addr=client?`${client.address}, ${client.city} NY ${client.zip}`:"";
                  const start=`${ds.replace(/-/g,"")}T${job.time.replace(":","")}00`;
                  const endH=String(parseInt(job.time.split(":")[0])+(svc?.duration?Math.ceil(svc.duration/60):1)).padStart(2,"0");
                  const end=`${ds.replace(/-/g,"")}T${endH}${job.time.split(":")[1]}00`;
                  const title=encodeURIComponent(`T&R Irrigation — ${job.client} — ${svc?.name||""}`);
                  const details=encodeURIComponent(`Tech: ${TECHS[job.tech].name}\nService: ${svc?.name}\nNotes: ${job.notes||"none"}`);
                  const loc=encodeURIComponent(addr);
                  return`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${start}/${end}&details=${details}&location=${loc}`;
                };
                const renderJobCard=job=>{
                  const svc=SERVICES.find(s=>s.id===job.service);
                  const tech=TECHS[job.tech];
                  const sc=statusColor(job.status||"scheduled");
                  const sb=statusBg(job.status||"scheduled");
                  return(
                    <div key={job.id} style={{background:sb,border:`1px solid ${sc}`,borderRadius:10,padding:"12px 14px",marginBottom:8}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                            <span style={{fontSize:11,color:tech.color,fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>{job.time}</span>
                            <span style={{fontSize:10,padding:"2px 7px",background:sc,borderRadius:10,color:"#e2e8f0",fontFamily:"'JetBrains Mono',monospace"}}>{statusLabel(job.status||"scheduled")}</span>
                          </div>
                          <div style={{fontSize:14,fontWeight:700,color:"#e2e8f0",marginBottom:2}}>{job.client}</div>
                          <div style={{fontSize:12,color:"#64748b"}}>{svc?.name} · {cur(svc?.rate||0)}</div>
                          {job.notes&&<div style={{fontSize:11,color:"#475569",marginTop:4,fontStyle:"italic"}}>📝 {job.notes}</div>}
                        </div>
                        <div style={{display:"flex",flexDirection:"column",gap:5,alignItems:"flex-end"}}>
                          <button onClick={()=>cycleStatus(job)} style={{padding:"4px 10px",background:sc,border:"none",borderRadius:6,color:"#fff",fontSize:10,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",whiteSpace:"nowrap"}}>
                            Next Status ›
                          </button>
                          <a href={makeGCalLink(job)} target="_blank" rel="noreferrer" style={{padding:"4px 10px",background:"#0c2040",border:"1px solid #1e3a5f",borderRadius:6,color:"#60a5fa",fontSize:10,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",textDecoration:"none",whiteSpace:"nowrap"}}>
                            + Google Cal
                          </a>
                          <button onClick={()=>setSelJob(job)} style={{padding:"4px 10px",background:"#0c2040",border:"1px solid #1e3a5f",borderRadius:6,color:"#94a3b8",fontSize:10,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>
                            Edit ✎
                          </button>
                        </div>
                      </div>
                    </div>
                  );
                };
                return(
                  <div style={{padding:"14px 18px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,paddingBottom:8,borderBottom:"1px solid #0c2040"}}>
                        <div style={{width:10,height:10,borderRadius:"50%",background:"#3b82f6"}}/>
                        <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:15,color:"#3b82f6"}}>Robert Pellicci</span>
                        <span style={{fontSize:10,color:"#334155",fontFamily:"'JetBrains Mono',monospace"}}>{robertJobs.length} job{robertJobs.length!==1?"s":""}</span>
                      </div>
                      {robertJobs.length===0?<div style={{fontSize:12,color:"#1e3a5f",padding:"20px 0",textAlign:"center",border:"1px dashed #1e3a5f",borderRadius:8}}>No jobs scheduled</div>:robertJobs.map(renderJobCard)}
                    </div>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,paddingBottom:8,borderBottom:"1px solid #0c2040"}}>
                        <div style={{width:10,height:10,borderRadius:"50%",background:"#10b981"}}/>
                        <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:15,color:"#10b981"}}>Thomas Pellicci</span>
                        <span style={{fontSize:10,color:"#334155",fontFamily:"'JetBrains Mono',monospace"}}>{thomasJobs.length} job{thomasJobs.length!==1?"s":""}</span>
                      </div>
                      {thomasJobs.length===0?<div style={{fontSize:12,color:"#1e3a5f",padding:"20px 0",textAlign:"center",border:"1px dashed #1e3a5f",borderRadius:8}}>No jobs scheduled</div>:thomasJobs.map(renderJobCard)}
                    </div>
                  </div>
                );
              })()}

              {/* WEEK VIEW */}
              {calView==="week"&&(
                <div style={{overflowX:"auto"}}>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(7,minmax(110px,1fr))",minWidth:700}}>
                    {weekDates.map((d,i)=>{
                      const ds=fmtD(d),isToday=ds===fmtD(new Date());
                      return(
                        <div key={i} style={{borderRight:"1px solid #0c2040",minHeight:300,borderTop:isToday?"2px solid #3b82f6":"2px solid transparent"}}>
                          <div style={{padding:"8px 8px 6px",borderBottom:"1px solid #0c2040",background:"#07111f",textAlign:"center",cursor:"pointer"}} onClick={()=>{setCalDate(d);setCalView("today");}}>
                            <div style={{fontSize:10,color:isToday?"#3b82f6":"#475569",fontFamily:"'JetBrains Mono',monospace"}}>{d.toLocaleDateString("en-US",{weekday:"short"})}</div>
                            <div style={{fontSize:18,fontWeight:700,color:isToday?"#3b82f6":"#94a3b8",fontFamily:"'Barlow Condensed',sans-serif"}}>{d.getDate()}</div>
                          </div>
                          <div style={{padding:"6px 5px",display:"flex",flexDirection:"column",gap:4}}>
                            {jobsForDate(ds).map(job=>{
                              const svc=SERVICES.find(s=>s.id===job.service),tech=TECHS[job.tech];
                              const sc=job.status==="complete"?"#166534":job.status==="enroute"?"#92400e":job.status==="followup"?"#7f1d1d":"#1e3a5f";
                              return(
                                <div key={job.id} onClick={()=>{setCalDate(d);setCalView("today");}} style={{padding:"5px 7px",borderRadius:7,borderLeft:`3px solid ${tech.color}`,background:sc,cursor:"pointer"}}>
                                  <div style={{fontSize:9,color:"#94a3b8",fontFamily:"'JetBrains Mono',monospace"}}>{job.time}</div>
                                  <div style={{fontSize:11,fontWeight:600,color:"#e2e8f0",lineHeight:1.2}}>{job.client}</div>
                                  <div style={{fontSize:10,color:"#64748b"}}>{svc?.name}</div>
                                  <div style={{fontSize:9,color:tech.color,marginTop:1}}>{tech.name.split(" ")[0]}</div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* BY TECH VIEW */}
              {calView==="employee"&&(
                <div style={{overflowX:"auto"}}>
                  <div style={{display:"grid",gridTemplateColumns:"70px 1fr 1fr",minWidth:480}}>
                    <div style={{background:"#07111f",borderRight:"1px solid #0c2040",borderBottom:"1px solid #0c2040"}}/>
                    {Object.entries(TECHS).map(([key,t])=>(
                      <div key={key} style={{padding:"10px 12px",display:"flex",alignItems:"center",gap:8,borderBottom:"1px solid #0c2040",background:"#07111f",borderLeft:`3px solid ${t.color}`}}>
                        <div style={{width:10,height:10,borderRadius:"50%",background:t.color}}/>
                        <div>
                          <div style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>{t.name}</div>
                          <div style={{fontSize:10,color:"#475569"}}>{avail[key].start} – {avail[key].end}</div>
                        </div>
                      </div>
                    ))}
                    {weekDates.map((d,i)=>{
                      const ds=fmtD(d),isToday=ds===fmtD(new Date());
                      return[
                        <div key={`l${i}`} onClick={()=>{setCalDate(d);setCalView("today");}} style={{padding:"8px 6px",textAlign:"center",borderBottom:"1px solid #0c2040",borderRight:"1px solid #0c2040",background:"#07111f",cursor:"pointer"}}>
                          <div style={{fontSize:9,color:isToday?"#3b82f6":"#475569",fontFamily:"'JetBrains Mono',monospace"}}>{d.toLocaleDateString("en-US",{weekday:"short"})}</div>
                          <div style={{fontSize:16,fontWeight:700,color:isToday?"#3b82f6":"#64748b",fontFamily:"'Barlow Condensed',sans-serif"}}>{d.getDate()}</div>
                        </div>,
                        ...Object.keys(TECHS).map(tk=>(
                          <div key={`${tk}${i}`} style={{padding:"6px 8px",borderBottom:"1px solid #0c2040",borderLeft:"1px solid #0c2040",minHeight:70,display:"flex",flexDirection:"column",gap:4}}>
                            {jobsForTechDate(tk,ds).map(job=>{
                              const svc=SERVICES.find(s=>s.id===job.service);
                              const sc=job.status==="complete"?"#166534":job.status==="enroute"?"#92400e":job.status==="followup"?"#7f1d1d":"#0c2040";
                              return(
                                <div key={job.id} onClick={()=>{setCalDate(d);setCalView("today");}} style={{padding:"4px 8px",borderRadius:6,background:sc,border:`1px solid ${TECHS[tk].color}33`,display:"flex",flexDirection:"column",gap:1,cursor:"pointer"}}>
                                  <span style={{fontSize:9,color:TECHS[tk].color,fontFamily:"'JetBrains Mono',monospace"}}>{job.time}</span>
                                  <span style={{fontSize:11,color:"#e2e8f0",fontWeight:600}}>{job.client}</span>
                                  <span style={{fontSize:10,color:"#475569"}}>{svc?.name}</span>
                                </div>
                              );
                            })}
                            {jobsForTechDate(tk,ds).length===0&&<div style={{fontSize:10,color:"#1e3a5f",padding:"6px 4px"}}>Available</div>}
                          </div>
                        ))
                      ];
                    })}
                  </div>
                </div>
              )}
            </div>
          )}

          {/* INVOICE */}
          {active==="invoice"&&(
            <div style={S.scroll}>
              {!invSent?(
                <div style={{display:"grid",gridTemplateColumns:"1fr 300px",gap:14,padding:"14px 18px"}}>
                  <div style={{display:"flex",flexDirection:"column",gap:12}}>
                    <div style={S.card}>
                      <div style={S.cardLbl}>CLIENT</div>
                      <select value={invClient} onChange={e=>setInvClient(e.target.value)} style={S.sel}>
                        <option value="">Select client...</option>
                        {CLIENTS.map(c=><option key={c.name} value={c.name}>{c.name} — {c.city}</option>)}
                      </select>
                    </div>
                    <div style={S.card}>
                      <div style={S.cardLbl}>ADD SERVICES</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                        {SERVICES.map(svc=>(
                          <button key={svc.id} onClick={()=>addLine(svc.id)} style={{padding:"8px 10px",background:"#060f1a",border:"1px solid #1e3a5f",borderRadius:8,cursor:"pointer",textAlign:"left",display:"flex",flexDirection:"column",gap:2}}>
                            <span style={{fontSize:12,fontWeight:600,color:"#e2e8f0"}}>{svc.name}</span>
                            <span style={{fontSize:11,color:"#10b981",fontFamily:"'JetBrains Mono',monospace"}}>{cur(svc.rate)}</span>
                          </button>
                        ))}
                      </div>
                    </div>
                    {invLines.length>0&&(
                      <div style={S.card}>
                        <div style={S.cardLbl}>LINE ITEMS</div>
                        {invLines.map(line=>(
                          <div key={line.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"1px solid #0c2040"}}>
                            <span style={{flex:1,fontSize:13,color:"#e2e8f0"}}>{line.name}</span>
                            <button onClick={()=>setInvLines(p=>p.map(l=>l.id===line.id?{...l,qty:Math.max(1,l.qty-1)}:l))} style={{width:24,height:24,background:"#0c2040",border:"1px solid #1e3a5f",borderRadius:5,color:"#94a3b8",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                            <span style={{fontSize:13,color:"#94a3b8",minWidth:16,textAlign:"center"}}>{line.qty}</span>
                            <button onClick={()=>setInvLines(p=>p.map(l=>l.id===line.id?{...l,qty:l.qty+1}:l))} style={{width:24,height:24,background:"#0c2040",border:"1px solid #1e3a5f",borderRadius:5,color:"#94a3b8",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                            <span style={{fontSize:13,color:"#10b981",fontFamily:"'JetBrains Mono',monospace",minWidth:60,textAlign:"right"}}>{cur(line.qty*line.rate)}</span>
                            <button onClick={()=>setInvLines(p=>p.filter(l=>l.id!==line.id))} style={{width:24,height:24,background:"#0c2040",border:"1px solid #1e3a5f",borderRadius:5,color:"#ef4444",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:12}}>
                    <div style={{...S.card,flex:1}}>
                      <div style={S.cardLbl}>INVOICE PREVIEW</div>
                      <div style={{paddingBottom:10,marginBottom:10,borderBottom:"1px solid #0c2040"}}>
                        <div style={{fontSize:15,fontWeight:700,color:"#3b82f6",fontFamily:"'Barlow Condensed',sans-serif"}}>T&R Irrigation LLC</div>
                        <div style={{fontSize:10,color:"#475569"}}>678 Route 25A, Rocky Point NY 11778</div>
                        <div style={{fontSize:10,color:"#475569"}}>(631) 494-2813</div>
                        <div style={{marginTop:8}}>
                          <div style={{fontSize:10,color:"#334155"}}>Invoice #: {invNum}</div>
                          <div style={{fontSize:10,color:"#334155"}}>Date: {new Date().toLocaleDateString()}</div>

                  </div>

                  {/* Quote line items preview */}
                  <div style={{background:"#060f1a",borderRadius:8,padding:"10px 12px",marginBottom:10}}>
                    <div style={{fontSize:9,color:"#1e3a5f",fontFamily:"'JetBrains Mono',monospace",marginBottom:6}}>T&R IRRIGATION LLC · 678 Route 25A, Rocky Point NY 11778 · (631) 494-2813</div>
                    {aiQuote.client&&<div style={{fontSize:11,color:"#64748b",marginBottom:8}}>Quote for: <strong style={{color:"#e2e8f0"}}>{aiQuote.client}</strong>{aiQuote.clientObj&&<span style={{color:"#475569"}}> · {aiQuote.clientObj.address}, {aiQuote.clientObj.city}</span>}</div>}
                    {aiQuote.lines.map((l,i)=>(
                      <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",borderBottom:"1px solid #0c2040"}}>
                        <span style={{color:"#94a3b8"}}>{l.name} × {l.qty}</span>
                        <span style={{color:"#e2e8f0",fontFamily:"'JetBrains Mono',monospace"}}>{cur(l.qty*l.rate)}</span>
                      </div>
                    ))}
                    {(()=>{
                      const sub=aiQuote.lines.reduce((s,l)=>s+l.qty*l.rate,0);
                      const tax=sub*TAX;
                      const total=sub+tax;
                      return(
                        <div style={{marginTop:8}}>
                          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#475569",marginBottom:2}}><span>Subtotal</span><span style={{fontFamily:"'JetBrains Mono',monospace"}}>{cur(sub)}</span></div>
                          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#475569",marginBottom:4}}><span>Tax (8.75%)</span><span style={{fontFamily:"'JetBrains Mono',monospace"}}>{cur(tax)}</span></div>
                          <div style={{display:"flex",justifyContent:"space-between",fontSize:14,fontWeight:700,color:"#10b981",borderTop:"1px solid #1e3a5f",paddingTop:6}}><span>Total</span><span style={{fontFamily:"'JetBrains Mono',monospace"}}>{cur(total)}</span></div>
                        </div>
                      );
                    })()}
                  </div>

                  {/* Action buttons */}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                    {/* Email Quote */}
                    <button onClick={()=>{
                      const sub=aiQuote.lines.reduce((s,l)=>s+l.qty*l.rate,0);
                      const tax=sub*TAX;
                      const total=sub+tax;
                      const client=aiQuote.clientObj;
                      const toEmail=client?.email||"";
                      const subject=encodeURIComponent(`T&R Irrigation LLC — Quote ${aiQuote.quoteNum}`);
                      const lineItems=aiQuote.lines.map(l=>`  ${l.name} x${l.qty}: ${cur(l.qty*l.rate)}`).join("\n");
                      const body=encodeURIComponent(
`Dear ${aiQuote.client||"Customer"},

Please find your quote from T&R Irrigation LLC below.

Quote #: ${aiQuote.quoteNum}
Date: ${new Date().toLocaleDateString()}

${lineItems}

Subtotal: ${cur(sub)}
Tax (8.75%): ${cur(tax)}
TOTAL: ${cur(total)}

To accept this quote or schedule service, please call or text us at (631) 494-2813.

Thank you,
Robert & Thomas Pellicci
T&R Irrigation LLC
678 Route 25A, Rocky Point NY 11778
T.R.irrigation27@gmail.com`
                      );
                      window.open(`mailto:${toEmail}?subject=${subject}&body=${body}`);
                    }} style={{padding:"10px 6px",background:"#0c2040",border:"1px solid #3b82f6",borderRadius:8,color:"#60a5fa",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'Barlow',sans-serif",textAlign:"center"}}>
                      📧 Email Quote
                    </button>

                    {/* Convert to Invoice */}
                    <button onClick={()=>{
                      setInvClient(aiQuote.client||"");
                      setInvLines(aiQuote.lines.map(l=>({...l,id:Date.now()+Math.random()})));
                      setInvSent(false);
                      setActive("invoice");
                      setAiQuote(null);
                    }} style={{padding:"10px 6px",background:"#10b981",border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'Barlow',sans-serif",textAlign:"center"}}>
                      📋 Make Invoice
                    </button>

                    {/* Book Job from Quote */}
                    <button onClick={()=>{
                      if(aiQuote.client)setNewJob(p=>({...p,client:aiQuote.client,service:aiQuote.lines[0]?.svcId||"startup"}));
                      setShowJobModal(true);
                      setAiQuote(null);
                    }} style={{padding:"10px 6px",background:"#0c2040",border:"1px solid #f59e0b",borderRadius:8,color:"#f59e0b",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'Barlow',sans-serif",textAlign:"center"}}>
                      📅 Book Job
                    </button>
                  </div>
                </div>
              )}

              <div style={{display:"flex",gap:8,padding:"12px 18px",borderTop:"1px solid #0c2040"}}>
                <textarea value={aiInput} onChange={e=>setAiInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendAI();}}} placeholder="Ask for a quote, diagnosis, system design, or routing..." rows={2}
                  style={{flex:1,background:"#0c1a2e",border:"1px solid #1e3a5f",borderRadius:9,color:"#e2e8f0",padding:"10px 13px",fontSize:13,fontFamily:"'Barlow',sans-serif",resize:"none",lineHeight:1.5}}/>
                <button onClick={()=>sendAI()} disabled={aiLoading||!aiInput.trim()}
                  style={{width:42,borderRadius:9,border:"none",color:"#fff",fontSize:19,background:aiLoading||!aiInput.trim()?"#1e293b":"#ef4444",cursor:aiLoading||!aiInput.trim()?"not-allowed":"pointer"}}>↑</button>
              </div>
              <div style={{fontSize:10,color:"#0c2040",textAlign:"center",padding:"3px 0 7px",fontFamily:"'JetBrains Mono',monospace"}}>Enter to send · Shift+Enter for new line</div>
            </div>
          )}

        </div>
      </div>

      {/* BOOK JOB MODAL */}
      {showJobModal&&(
        <div style={S.modalOverlay} onClick={()=>setShowJobModal(false)}>
          <div style={S.modal} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
              <div style={{fontSize:16,fontWeight:700,color:"#e2e8f0",fontFamily:"'Barlow Condensed',sans-serif"}}>Book New Job</div>
              <button onClick={()=>setShowJobModal(false)} style={{background:"none",border:"none",color:"#475569",cursor:"pointer",fontSize:18}}>✕</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {[["Client",<select value={newJob.client} onChange={e=>setNewJob(p=>({...p,client:e.target.value}))} style={S.sel}><option value="">Select client...</option>{CLIENTS.map(c=><option key={c.name} value={c.name}>{c.name} — {c.city}</option>)}</select>],["Service",<select value={newJob.service} onChange={e=>setNewJob(p=>({...p,service:e.target.value}))} style={S.sel}>{SERVICES.map(s=><option key={s.id} value={s.id}>{s.name} — {cur(s.rate)}</option>)}</select>]].map(([label,field])=>(
                <div key={label}><label style={S.fLabel}>{label}</label>{field}</div>
              ))}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><label style={S.fLabel}>Technician</label><select value={newJob.tech} onChange={e=>setNewJob(p=>({...p,tech:e.target.value}))} style={S.sel}><option value="robert">Robert Pellicci</option><option value="thomas">Thomas Pellicci</option></select></div>
                <div><label style={S.fLabel}>Time</label><input type="time" value={newJob.time} onChange={e=>setNewJob(p=>({...p,time:e.target.value}))} style={S.sel}/></div>
              </div>
              <div><label style={S.fLabel}>Date</label><input type="date" value={newJob.date} onChange={e=>setNewJob(p=>({...p,date:e.target.value}))} style={S.sel}/></div>
              <div><label style={S.fLabel}>Notes</label><input value={newJob.notes} onChange={e=>setNewJob(p=>({...p,notes:e.target.value}))} placeholder="e.g. 6 zones, gate code 1234" style={S.sel}/></div>
              {newJob.date&&newJob.tech&&(
                <div style={{background:"#060f1a",border:"1px solid #1e3a5f",borderRadius:8,padding:"8px 12px"}}>
                  <div style={{fontSize:10,color:"#475569",marginBottom:4}}>{TECHS[newJob.tech].name} — {new Date(newJob.date+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"})}</div>
                  {jobsForTechDate(newJob.tech,newJob.date).length===0?<div style={{fontSize:12,color:"#10b981"}}>✓ Fully available</div>:jobsForTechDate(newJob.tech,newJob.date).map(j=><div key={j.id} style={{fontSize:12,color:"#f59e0b"}}>⚠ {j.time} — {j.client}</div>)}
                </div>
              )}
              <button onClick={()=>{if(!newJob.client)return;setJobs(p=>[...p,{...newJob,id:`j${Date.now()}`,status:"scheduled"}]);setShowJobModal(false);setNewJob({client:"",service:"startup",tech:"robert",date:fmtD(today),time:"09:00",notes:""}); }}
                style={{padding:"11px 0",background:"#3b82f6",border:"none",borderRadius:9,color:"#fff",fontSize:14,fontWeight:700,fontFamily:"'Barlow',sans-serif",cursor:"pointer",marginTop:4}}>
                ✓ Confirm Booking
              </button>
            </div>
          </div>
        </div>
      )}

      {/* JOB DETAIL / EDIT MODAL */}
      {selJob&&(()=>{
        const svc=SERVICES.find(s=>s.id===selJob.service);
        const client=CLIENTS.find(c=>c.name===selJob.client);
        const addr=client?`${client.address}, ${client.city} NY ${client.zip}`:"";
        const ds=selJob.date;
        const start=`${ds.replace(/-/g,"")}T${selJob.time.replace(":","")}00`;
        const endH=String(parseInt(selJob.time.split(":")[0])+(svc?.duration?Math.ceil(svc.duration/60):1)).padStart(2,"0");
        const end=`${ds.replace(/-/g,"")}T${endH}${selJob.time.split(":")[1]}00`;
        const gcalUrl=`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(`T&R Irrigation — ${selJob.client} — ${svc?.name||""}`)}&dates=${start}/${end}&details=${encodeURIComponent(`Tech: ${TECHS[selJob.tech].name}\nService: ${svc?.name}\nNotes: ${selJob.notes||"none"}`)}&location=${encodeURIComponent(addr)}`;
        const [editNotes,setEditNotes]=useState(selJob.notes||"");
        return(
          <div style={S.modalOverlay} onClick={()=>setSelJob(null)}>
            <div style={S.modal} onClick={e=>e.stopPropagation()}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
                <div style={{fontSize:16,fontWeight:700,color:"#e2e8f0",fontFamily:"'Barlow Condensed',sans-serif"}}>Job Details</div>
                <button onClick={()=>setSelJob(null)} style={{background:"none",border:"none",color:"#475569",cursor:"pointer",fontSize:18}}>✕</button>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {[["Client",selJob.client],["Service",svc?.name],["Tech",TECHS[selJob.tech].name],["Date",new Date(selJob.date+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})],["Time",selJob.time],["Address",addr||"—"],["Rate",cur(svc?.rate||0)]].map(([l,v])=>(
                  <div key={l} style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                    <span style={{fontSize:10,color:"#334155",width:60,flexShrink:0,fontFamily:"'JetBrains Mono',monospace",paddingTop:1}}>{l}</span>
                    <span style={{fontSize:13,color:"#94a3b8"}}>{v}</span>
                  </div>
                ))}
                <div>
                  <label style={S.fLabel}>JOB NOTES / FOLLOW-UP</label>
                  <textarea value={editNotes} onChange={e=>setEditNotes(e.target.value)} rows={3} placeholder="Gate code, issues found, parts needed, follow-up required..."
                    style={{width:"100%",background:"#060f1a",border:"1px solid #1e3a5f",borderRadius:8,color:"#e2e8f0",padding:"10px 12px",fontSize:12,fontFamily:"'JetBrains Mono',monospace",resize:"vertical",lineHeight:1.5}}/>
                </div>
                <div>
                  <label style={S.fLabel}>JOB STATUS</label>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                    {[["scheduled","● Scheduled","#1e3a5f"],["enroute","→ En Route","#92400e"],["complete","✓ Complete","#166534"],["followup","! Follow-up","#7f1d1d"]].map(([val,label,bg])=>(
                      <button key={val} onClick={()=>setJobs(p=>p.map(j=>j.id===selJob.id?{...j,status:val}:j))}
                        style={{padding:"8px 0",background:selJob.status===val?bg:"#060f1a",border:`1px solid ${bg}`,borderRadius:7,color:selJob.status===val?"#fff":"#64748b",fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>
                        {label}
                      </button>
                    ))}
                  </div>
                </div>
                <a href={gcalUrl} target="_blank" rel="noreferrer"
                  style={{display:"block",padding:"11px 0",background:"#0c2040",border:"1px solid #1e3a5f",borderRadius:9,color:"#60a5fa",fontSize:13,fontWeight:700,fontFamily:"'Barlow',sans-serif",textAlign:"center",textDecoration:"none"}}>
                  📅 Add to Google Calendar
                </a>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{setJobs(p=>p.map(j=>j.id===selJob.id?{...j,notes:editNotes,status:selJob.status}:j));setSelJob(null);}}
                    style={{flex:2,padding:"11px 0",background:"#3b82f6",border:"none",borderRadius:9,color:"#fff",fontSize:13,fontWeight:700,fontFamily:"'Barlow',sans-serif",cursor:"pointer"}}>
                    ✓ Save Changes
                  </button>
                  <button onClick={()=>{if(window.confirm("Delete this job?"))setJobs(p=>p.filter(j=>j.id!==selJob.id));setSelJob(null);}}
                    style={{flex:1,padding:"11px 0",background:"#200000",border:"1px solid #7f1d1d",borderRadius:9,color:"#f87171",fontSize:13,fontFamily:"'Barlow',sans-serif",cursor:"pointer"}}>
                    Delete
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      })()}

      {showAvailModal&&(
        <div style={S.modalOverlay} onClick={()=>setShowAvailModal(false)}>
          <div style={S.modal} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
              <div style={{fontSize:16,fontWeight:700,color:"#e2e8f0",fontFamily:"'Barlow Condensed',sans-serif"}}>Edit Working Hours</div>
              <button onClick={()=>setShowAvailModal(false)} style={{background:"none",border:"none",color:"#475569",cursor:"pointer",fontSize:18}}>✕</button>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              {Object.entries(TECHS).map(([key,t])=>(
                <button key={key} onClick={()=>setEditTech(key)} style={{flex:1,padding:"8px 0",background:editTech===key?"#1e3a5f":"#060f1a",border:`1px solid ${editTech===key?t.color:"#1e3a5f"}`,borderRadius:8,color:editTech===key?t.color:"#475569",cursor:"pointer",fontSize:12,fontFamily:"'Barlow',sans-serif"}}>
                  {t.name.split(" ")[0]}
                </button>
              ))}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {[["Start Time","start"],["End Time","end"]].map(([label,key])=>(
                  <div key={key}><label style={S.fLabel}>{label}</label><input type="time" value={avail[editTech][key]} onChange={e=>setAvail(p=>({...p,[editTech]:{...p[editTech],[key]:e.target.value}}))} style={S.sel}/></div>
                ))}
              </div>
              <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:12,color:"#94a3b8"}}>
                <input type="checkbox" checked={avail[editTech].lunch} onChange={e=>setAvail(p=>({...p,[editTech]:{...p[editTech],lunch:e.target.checked}}))}/>
                Block 12pm–1pm lunch break
              </label>
              <button onClick={()=>setShowAvailModal(false)} style={{padding:"11px 0",background:TECHS[editTech].color,border:"none",borderRadius:9,color:"#fff",fontSize:14,fontWeight:700,fontFamily:"'Barlow',sans-serif",cursor:"pointer",marginTop:4}}>
                ✓ Save Hours
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
